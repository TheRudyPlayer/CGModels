<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CGModels Alpha</title>

  <!-- visor 3D -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 15px;
      padding: 10px;
    }

    model-viewer {
      width: 100%;
      height: 200px;
      background: #111;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 15px;
      background: #ff0033;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Modelos CG</h1>

<div class="grid" id="grid"></div>

<script>
  // LISTA DE MODELOS (alpha manual)
  const modelos = [
    "Chicken Gun Rudy.glb",
    "Chicken Gun Den19K.glb",
    "Chicken Gun Tall Chicken.glb",
    "Dust.glb",
    "Proto02.glb"
  ];

  const grid = document.getElementById("grid");

  modelos.forEach(nombreArchivo => {
    const nombre = nombreArchivo.replace(".glb", "");

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${nombre}</h3>

      <model-viewer 
        src="assets/${nombreArchivo}"
        auto-rotate
        camera-controls>
      </model-viewer>

      <a href="assets/${nombreArchivo}" download>
        <button>Descargar</button>
      </a>
    `;

    grid.appendChild(card);
  });
</script>

</body>
</html>
